<!doctype html>
<html>
<body style="font-family:sans-serif">
<h3>Bare getUserMedia test</h3>
<button onclick="run()">Start camera</button>
<pre id="log" style="white-space:pre-wrap"></pre>
<video id="v" autoplay playsinline muted style="width:480px;background:#000"></video>
<script>
const log = (m) => document.getElementById('log').textContent += m + "\n";
async function run() {
  log("enumerating devices...");
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    devices.filter(d=>d.kind==='videoinput').forEach(d=>log("  camera: " + d.label + " / " + d.deviceId));
  } catch(e) { log("enumerate failed: " + e); }

  log("requesting getUserMedia({video:true})...");
  const t0 = performance.now();
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    log("SUCCESS in " + Math.round(performance.now()-t0) + "ms");
    document.getElementById('v').srcObject = stream;
  } catch (e) {
    log("FAILED after " + Math.round(performance.now()-t0) + "ms: " + e.name + " - " + e.message);
  }
}
</script>
</body>
</html>
